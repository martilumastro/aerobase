{% extends 'gestionale/base.html' %}

{% block title %}Aerobase | Pagamento completato{% endblock %}

{% block content %}
<section class="success-page">
    <div class="success-card">
        <div class="success-mark">OK</div>

        <p class="eyebrow">Pagamento completato</p>
        <h1>Posto confermato</h1>

        <p class="muted">
            La prenotazione è stata registrata correttamente.
        </p>

        <div class="transaction-box">
            <span>Codice transazione</span>
            <strong>{{ txn_id }}</strong>
        </div>

        <a href="{% url 'gestionale:prenotazioni_cliente' %}" class="button button-primary">
            Vai alle mie prenotazioni
        </a>
    </div>
</section>
{% endblock %}
